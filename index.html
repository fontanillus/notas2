<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Promedio notas</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    @import "tailwindcss";

    @layer base {

      p,
      h1,
      h2,
      h3 {
        @apply mb-2 leading-relaxed;
      }

      h1,
      h2,
      h3 {
        @apply mt-2;
      }

      input {
        @apply border border-slate-300 font-mono;
      }

    }
  </style>
</head>

<body class="min-h-screen bg-slate-100 px-4 py-8">

  <!-- Contenedor principal -->
  <div
    class="mx-auto w-full max-w-xl rounded-xl border border-slate-200 bg-white shadow-lg sm:p-8">

    <!-- Formulario -->
    <form
      class="space-y-4 text-center"
      autocomplete="off">

      <!-- Título -->
      <h1
        class="text-2xl font-bold text-slate-700 sm:text-3xl">
        Promedio Notas
      </h1>

      <!-- Descripción -->
      <p
        class="text-sm leading-relaxed text-slate-700 sm:text-base">

        <span class="font-semibold">
          Introduzca sus notas de cada asignatura para poder calcular la nota promedio.
        </span>

      </p>

      <!-- Input Flex -->
      <div>

        <label
          for="flex"
          class="mx-auto block w-full max-w-md text-left text-slate-700">

          Nota Flex:

          <input
            type="number"
            id="flex"
            min="1"
            max="10"
            required
            placeholder="Ej: 8"
            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-slate-700 outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-200">

        </label>

      </div>

      <!-- Input Grid -->
      <div>

        <label
          for="grid"
          class="mx-auto block w-full max-w-md text-left text-slate-700">

          Nota Grid:

          <input
            type="number"
            id="grid"
            min="1"
            max="10"
            required
            placeholder="Ej: 7"
            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-slate-700 outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-200">

        </label>

      </div>

      <!-- Input JavaScript -->
      <div>

        <label
          for="java"
          class="mx-auto block w-full max-w-md text-left text-slate-700">

          Nota JavaScript:

          <input
            type="number"
            id="java"
            min="1"
            max="10"
            required
            placeholder="Ej: 9"
            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-slate-700 outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-200">

        </label>

      </div>

      <!-- Botón -->
      <div>

        <button
          type="button"
          onclick="calcular()"
          class="inline-flex items-center justify-center rounded-md border-2 border-slate-500 bg-blue-900 px-5 py-2 font-semibold text-white transition-colors hover:bg-blue-800 active:scale-[0.99] active:bg-blue-950">

          Total nota promedio

        </button>

      </div>

      <!-- Resultado -->
      <div
        id="totalNotaPromedia"
        aria-live="polite"
        class="mt-2 text-lg font-bold text-slate-800">

      </div>

      <!-- Imagen -->
      <img
        src="img/OIP-removebg-preview (5).png"
        alt="Imagen decorativa"
        class="mx-auto w-32 sm:w-40 md:w-48">

    </form>

  </div>

  <script>

    // ELEMENTOS

    const FLEX =
      document.getElementById("flex");

    const GRID =
      document.getElementById("grid");

    const JAVA =
      document.getElementById("java");

    const RESULTADO =
      document.getElementById("totalNotaPromedia");

    // FUNCIÓN PRINCIPAL

    function calcular() {

      // VALIDAR CAMPOS VACÍOS

      if (
        !FLEX.value ||
        !GRID.value ||
        !JAVA.value
      ) {

        RESULTADO.textContent =
          "Por favor rellena todas las notas";

        RESULTADO.className =
          "mt-2 text-lg font-bold text-red-700";

        console.warn(
          "Faltan valores en los inputs"
        );

        return;

      }

      // CONVERTIR A NÚMEROS

      const notasFlex =
        Number(FLEX.value);

      const notasGrid =
        Number(GRID.value);

      const notasJava =
        Number(JAVA.value);

      // VALIDAR RANGO

      if (

        notasFlex < 1 || notasFlex > 10 ||
        notasGrid < 1 || notasGrid > 10 ||
        notasJava < 1 || notasJava > 10

      ) {

        RESULTADO.textContent =
          "Las notas deben estar entre 1 y 10";

        RESULTADO.className =
          "mt-2 text-lg font-bold text-red-700";

        console.warn(
          "Notas fuera de rango"
        );

        return;

      }

      // CALCULAR PROMEDIO

      const total =
        (notasFlex + notasGrid + notasJava) / 3;

      // LOGS

      console.log(
        "=== DATOS INTRODUCIDOS ==="
      );

      console.log(
        "Flex:",
        notasFlex
      );

      console.log(
        "Grid:",
        notasGrid
      );

      console.log(
        "JavaScript:",
        notasJava
      );

      console.log(
        "=== RESULTADO ==="
      );

      console.log(
        "Promedio:",
        total
      );

      // MOSTRAR RESULTADO

      RESULTADO.textContent =
        "Tu nota promedio es: " +
        total.toFixed(2);

      // COLOR RESULTADO

      if (total >= 5) {

        RESULTADO.className =
          "mt-2 text-lg font-bold text-green-700";

      } else {

        RESULTADO.className =
          "mt-2 text-lg font-bold text-red-700";

      }

    }

  </script>

</body>

</html>
